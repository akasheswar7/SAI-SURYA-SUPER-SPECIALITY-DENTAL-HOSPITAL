<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Sai Surya Dental Clinic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            clinic: {
              light: '#f0f9ff',
              sky: '#0ea5e9',
              dark: '#0369a1',
              navy: '#0f172a',
              teal: '#0d9488',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-700 antialiased font-body">

  <!-- Header -->
  <header class="bg-white shadow-sm py-5 border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <img src="assets/logo.jpg" alt="Logo" class="h-10 w-10 rounded-full object-cover">
        <div>
          <span class="block font-heading font-extrabold text-slate-800 text-base leading-none">SAI SURYA ADMIN</span>
          <span class="block font-heading text-[10px] text-sky-600 font-bold uppercase tracking-wider mt-0.5">Appointment Database</span>
        </div>
      </a>
      <a href="index.html" class="text-xs font-bold text-slate-600 hover:text-sky-600 uppercase tracking-wider flex items-center gap-1">
        <i data-lucide="home" class="w-4 h-4"></i> View Website
      </a>
    </div>
  </header>

  <!-- Main panel -->
  <main class="max-w-7xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl border border-slate-100 shadow-xl p-6 sm:p-10">
      
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <div>
          <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-800 font-heading">Appointment Bookings</h1>
          <p class="text-slate-500 text-xs sm:text-sm mt-1">Real-time persistent appointment logs submitted via the contact forms.</p>
        </div>
        <button id="refresh-btn" class="flex items-center gap-2 px-4 py-2 bg-sky-50 text-sky-700 hover:bg-sky-100 rounded-xl text-sm font-bold transition-all">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh Data
        </button>
      </div>

      <!-- Bookings Table -->
      <div class="overflow-x-auto rounded-2xl border border-slate-100">
        <table class="w-full text-left text-sm border-collapse">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-100 text-slate-600 font-bold text-xs uppercase tracking-wider">
              <th class="px-6 py-4">Submission Date</th>
              <th class="px-6 py-4">Patient Name</th>
              <th class="px-6 py-4">Mobile Number</th>
              <th class="px-6 py-4">Email</th>
              <th class="px-6 py-4">Required Treatment</th>
              <th class="px-6 py-4">Symptom Message</th>
            </tr>
          </thead>
          <tbody id="appointments-tbody" class="divide-y divide-slate-100">
            <!-- Dynamic rows -->
            <tr>
              <td colspan="6" class="px-6 py-12 text-center text-slate-400 font-medium">
                <div class="flex flex-col items-center justify-center gap-2">
                  <i data-lucide="loader" class="w-8 h-8 text-sky-500 animate-spin"></i>
                  <span>Fetching bookings database...</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <script>
    const tbody = document.getElementById('appointments-tbody');
    const refreshBtn = document.getElementById('refresh-btn');

    async function loadAppointments() {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" class="px-6 py-12 text-center text-slate-400 font-medium">
            <div class="flex flex-col items-center justify-center gap-2">
              <i data-lucide="loader" class="w-8 h-8 text-sky-500 animate-spin"></i>
              <span>Loading records...</span>
            </div>
          </td>
        </tr>
      `;
      lucide.createIcons();

      try {
        const res = await fetch('/api/appointments');
        const data = await res.json();

        if (data.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="6" class="px-6 py-16 text-center text-slate-400 font-medium">
                <i data-lucide="calendar-x" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                <span class="block text-slate-500 font-semibold text-base">No appointments booked yet</span>
                <span class="block text-xs text-slate-400 mt-1">Submit booking requests from the Home or Contact page to see them listed here.</span>
              </td>
            </tr>
          `;
          lucide.createIcons();
          return;
        }

        tbody.innerHTML = '';
        data.forEach(appt => {
          const tr = document.createElement('tr');
          tr.className = 'hover:bg-slate-50/50 transition-colors';
          tr.innerHTML = `
            <td class="px-6 py-4 text-slate-500 font-semibold text-xs whitespace-nowrap">${appt.dateCreated}</td>
            <td class="px-6 py-4 text-slate-800 font-bold text-sm whitespace-nowrap">${appt.name}</td>
            <td class="px-6 py-4 font-semibold text-sky-600 whitespace-nowrap">
              <a href="tel:${appt.phone}" class="hover:underline flex items-center gap-1">
                <i data-lucide="phone" class="w-3 h-3"></i> ${appt.phone}
              </a>
            </td>
            <td class="px-6 py-4 text-slate-600 whitespace-nowrap">
              ${appt.email ? `<a href="mailto:${appt.email}" class="hover:underline text-xs flex items-center gap-1"><i data-lucide="mail" class="w-3 h-3"></i> ${appt.email}</a>` : '<span class="text-slate-400 text-xs italic">Not Provided</span>'}
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="px-2.5 py-1 rounded-full text-xs font-bold ${appt.treatment === 'Emergency Dental Care' ? 'bg-red-50 text-red-700 border border-red-100' : 'bg-sky-50 text-sky-700 border border-sky-100'}">
                ${appt.treatment}
              </span>
            </td>
            <td class="px-6 py-4 text-slate-500 text-xs leading-relaxed max-w-xs truncate" title="${appt.message || ''}">
              ${appt.message ? appt.message : '<span class="text-slate-300 italic">None</span>'}
            </td>
          `;
          tbody.appendChild(tr);
        });
        lucide.createIcons();

      } catch (err) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="px-6 py-12 text-center text-red-500 font-medium">
              <i data-lucide="alert-circle" class="w-8 h-8 mx-auto mb-2"></i>
              <span>Failed to load appointments from Node server database.</span>
            </td>
          </tr>
        `;
        lucide.createIcons();
      }
    }

    refreshBtn.addEventListener('click', loadAppointments);
    window.addEventListener('DOMContentLoaded', loadAppointments);
  </script>
</body>
</html>
